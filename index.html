<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>シュート率トラッカー</title>

    <style>
        body {
            font-family: "Yu Gothic", sans-serif;
            text-align: center;
            background: #f4f4f4;
            padding: 20px;
            margin: 0;
        }

        .card {
            background: white;
            max-width: 360px;
            margin: 20px auto;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        h1 {
            font-size: 28px;
        }

        button {
            width: 90%;
            font-size: 28px;
            padding: 18px;
            margin: 10px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
        }

        .success-btn {
            background: #4CAF50;
            color: white;
        }

        .miss-btn {
            background: #E53935;
            color: white;
        }

        .reset-btn {
            background: #9E9E9E;
            color: white;
        }

        .voice-btn {
            background: #1976D2;
            color: white;
        }

        #voiceStatus {
            font-size: 16px;
            line-height: 1.5;
            margin-top: 15px;
        }
    </style>
</head>

<body>

<div class="card">

    <h1>🏀 シュート率トラッカー</h1>

    <h2>成功 <span id="success">0</span></h2>
    <h2>失敗 <span id="miss">0</span></h2>
    <h2>成功率 <span id="rate">0</span>%</h2>

    <button class="success-btn" onclick="addSuccess()">🏀 成功</button>
    <button class="miss-btn" onclick="addMiss()">❌ 失敗</button>
    <button class="reset-btn" onclick="resetScore()">🔄 リセット</button>
    <button class="voice-btn" onclick="startVoice()">🎤 音声入力開始</button>

    <p id="voiceStatus">音声入力は停止中です</p>

</div>

<script src="script.js"></script>

</body>
</html>
